<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" type="module"></script>
</head>
<body>
  <div class="world" data-world>
    <div class="score" data-score>0</div>
    <div class="start-screen" data-start-screen>Press Any Key To Start</div>
    <img src="imgs/ground.png" class="ground" data-ground>
    <img src="imgs/ground.png" class="ground" data-ground>
    <img src="imgs/dino-stationary.png" class="dino" data-dino>
  </div>
  <fieldset class="theme-picker" data-theme-picker>
    <legend>Background</legend>
    <label>
      <input type="radio" name="theme" value="latte" data-theme-radio>
      Latte
    </label>
    <label>
      <input type="radio" name="theme" value="frappe" data-theme-radio>
      Frappé
    </label>
    <label>
      <input type="radio" name="theme" value="macchiato" data-theme-radio>
      Macchiato
    </label>
    <label>
      <input type="radio" name="theme" value="mocha" data-theme-radio>
      Mocha
    </label>
  </fieldset>
</body>
</html>
